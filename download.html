<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#020B18">
<link rel="manifest" href="manifest.webmanifest">
<title>下载 CityRail 轨道交通模拟器</title>
<style>
  :root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#020b18;color:#eef7ff;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 8%,rgba(10,132,255,.28),transparent 34%),linear-gradient(140deg,#020b18 0%,#081421 48%,#06111d 100%);color:#eef7ff;}
  .page{min-height:100vh;display:flex;align-items:center;padding:36px 22px;}
  .wrap{width:min(1220px,100%);margin:0 auto;display:grid;grid-template-columns:minmax(0,1fr) minmax(260px,380px);gap:58px;align-items:center;}
  .content{min-width:0;}
  h1{margin:0;font-size:clamp(42px,7vw,82px);line-height:.98;letter-spacing:0;font-weight:950;}
  .lede{margin:22px 0 0;max-width:720px;color:rgba(238,247,255,.72);font-size:18px;line-height:1.75;}
  .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:34px;}
  .btn{min-width:210px;height:58px;border-radius:16px;padding:0 28px;display:inline-flex;align-items:center;justify-content:center;text-align:center;text-decoration:none;font-size:18px;font-weight:900;line-height:1;color:#fff;background:#0a84ff;border:1px solid #54b8ff;box-shadow:0 18px 46px rgba(10,132,255,.32);vertical-align:middle;}
  .btn.primary{background:#0a84ff;border-color:#54b8ff;box-shadow:0 18px 46px rgba(10,132,255,.32);}
  .btn.secondary{background:rgba(255,255,255,.08);border-color:rgba(238,247,255,.24);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);}
  .btn[aria-disabled="true"]{opacity:.52;cursor:not-allowed;box-shadow:none}
  .note{margin-top:18px;color:rgba(238,247,255,.58);font-size:13px;line-height:1.7;}
  .status{margin-top:18px;color:rgba(238,247,255,.58);font-size:13px;line-height:1.7;}
  .install-card{margin-top:20px;max-width:720px;border:1px solid rgba(238,247,255,.14);border-radius:16px;background:rgba(255,255,255,.055);padding:18px 18px 16px;}
  .install-card h2{margin:0 0 10px;font-size:17px;line-height:1.35;}
  .install-card ol{margin:0;padding-left:20px;color:rgba(238,247,255,.68);line-height:1.7;font-size:13px;}
  .install-card[hidden]{display:none}
  .logo-stage{position:relative;min-height:390px;display:flex;align-items:center;justify-content:center;}
  .logo-stage::before{content:"";position:absolute;width:min(420px,72vw);aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(10,132,255,.26),rgba(10,132,255,.08) 42%,transparent 70%);filter:blur(2px);}
  .logo-stage::after{content:"";position:absolute;inset:16%;border:1px solid rgba(125,212,255,.14);border-radius:34px;transform:rotate(-8deg);opacity:.72;}
  .logo-img{position:relative;z-index:1;width:min(340px,76vw);height:auto;border-radius:34px;box-shadow:0 34px 100px rgba(0,0,0,.42),0 0 80px rgba(10,132,255,.16);}
  @media(max-width:920px){
    .page{align-items:flex-start}
    .wrap{grid-template-columns:1fr;gap:34px}
    .logo-stage{min-height:auto;order:-1;justify-content:flex-start}
    .logo-stage::before{width:240px}
    .logo-stage::after{display:none}
    .logo-img{width:132px;border-radius:22px;box-shadow:0 18px 52px rgba(0,0,0,.35)}
  }
</style>
</head>
<body>
<main class="page">
  <div class="wrap">
    <section class="content">
      <h1>将一座城市<br>交给你的规划</h1>
      <p class="lede">下载至桌面使用，性能表现更稳定，同时可正常接收版本更新。付费状态与在线版本通用，无需重复付费。</p>
      <div class="actions">
        <a class="btn primary" href="/" id="play-online">在线游玩</a>
        <a class="btn" href="#" id="download-installer">读取安装包…</a>
        <a class="btn secondary" href="#" id="download-portable" hidden>下载便携版</a>
      </div>
      <div class="status" id="release-status">正在读取发布清单…</div>
      <section class="install-card" id="install-card" hidden>
        <h2 id="install-title">安装说明</h2>
        <ol id="install-steps"></ol>
      </section>
    </section>
    <aside class="logo-stage" aria-label="CityRail Logo">
      <img class="logo-img" src="logo.webp" alt="CityRail 轨道交通模拟器 Logo" width="512" height="512" decoding="async">
    </aside>
  </div>
</main>
<script>
(function(){
  var installer=document.getElementById('download-installer');
  var portable=document.getElementById('download-portable');
  var status=document.getElementById('release-status');
  var installCard=document.getElementById('install-card');
  var installTitle=document.getElementById('install-title');
  var installSteps=document.getElementById('install-steps');
  var releaseManifest=null;
  var releaseReady=false;
  function platformKey(){
    var ua=(navigator.userAgent||'').toLowerCase();
    var platform=(navigator.platform||'').toLowerCase();
    if(/android/.test(ua)) return 'android';
    if(/iphone|ipad|ipod/.test(ua)) return 'ios';
    if(/mac/.test(platform)||/mac os x/.test(ua)) return 'macos';
    if(/win/.test(platform)||/windows/.test(ua)) return 'windows';
    return 'windows';
  }
  function platformRelease(manifest){
    var key=platformKey();
    var platforms=manifest && manifest.platforms ? manifest.platforms : {};
    return { key:key, platform:platforms[key] || null };
  }
  function isAvailable(item){
    return !!(item && item.status==='available' && item.url);
  }
  function setDisabled(el, disabled){
    if(!el) return;
    el.setAttribute('aria-disabled', disabled ? 'true' : 'false');
    el.tabIndex = disabled ? -1 : 0;
  }
  setDisabled(installer,true);
  setDisabled(portable,true);
  function renderSteps(title, steps){
    if(!installCard || !installTitle || !installSteps) return;
    installTitle.textContent=title || '安装说明';
    installSteps.innerHTML='';
    (steps||[]).forEach(function(step){
      var li=document.createElement('li');
      li.textContent=step;
      installSteps.appendChild(li);
    });
    installCard.hidden = !(steps && steps.length);
  }
  function renderRelease(){
    var selected=platformRelease(releaseManifest||{});
    var platform=selected.platform;
    if(!platform){
      if(installer) installer.textContent='当前系统暂未支持安装包';
      if(portable) portable.hidden=true;
      setDisabled(installer,true);
      status.textContent='当前系统暂未发布桌面客户端，请先使用在线版。';
      renderSteps('',[]);
      return;
    }
    var installItem=platform.installer;
    var portableItem=platform.portable;
    var displayName=platform.displayName || selected.key;

    if(installer){
      installer.textContent=installItem && installItem.label ? '下载 '+installItem.label : '下载 '+displayName+' 安装包';
      setDisabled(installer,!isAvailable(installItem));
    }
    if(portable){
      portable.hidden=!isAvailable(portableItem);
      portable.textContent=portableItem && portableItem.label ? '下载 '+portableItem.label : '下载便携版';
      setDisabled(portable,!isAvailable(portableItem));
    }

    if(isAvailable(installItem)){
      status.textContent='当前官网版本 '+releaseManifest.webVersion+'。推荐下载正式安装包；安装后会自动加载官网最新版。';
      renderSteps(installItem.label+'安装步骤', installItem.instructions);
    }else if(isAvailable(portableItem)){
      status.textContent=displayName+' 正式安装包正在准备中。现在可使用便携版：下载后解压文件夹，双击启动文件即可使用。';
      renderSteps(portableItem.label+'使用步骤', portableItem.instructions);
    }else if(selected.key==='ios'){
      status.textContent='iPhone / iPad 暂时使用在线版。iOS 客户端后续通过 App Store 发布。';
      renderSteps('iOS 使用方式', installItem && installItem.instructions);
    }else{
      status.textContent=displayName+' 客户端正在准备中，请先使用在线版。';
      renderSteps(installItem && installItem.label ? installItem.label : displayName+' 安装包', installItem && installItem.instructions);
    }
  }
  function downloadItem(item, kind){
    if(!releaseReady){
      status.textContent='正在读取发布清单，请稍后再下载。';
      return;
    }
    if(isAvailable(item)){
      location.href=item.url;
      status.textContent=kind==='portable'
        ? '正在下载便携版。下载后解压文件夹，按页面步骤打开。'
        : '正在下载安装包。下载完成后按安装向导完成安装。';
      return;
    }
    if(item && item.status==='app-store-required'){
      status.textContent='当前系统需要通过应用商店发布客户端，请先使用在线版。';
      return;
    }
    if(item && item.status==='preparing'){
      status.textContent=(item.label || '当前系统安装包')+'正在准备中，请先使用在线版。';
      return;
    }
    status.textContent=kind==='portable' ? '当前系统暂未发布便携版。' : '当前系统暂未发布正式安装包，请先使用在线版。';
  }
  if(installer){
    installer.addEventListener('click',function(event){
      event.preventDefault();
      var selected=platformRelease(releaseManifest||{});
      downloadItem(selected.platform && selected.platform.installer, 'installer');
    });
  }
  if(portable){
    portable.addEventListener('click',function(event){
      event.preventDefault();
      var selected=platformRelease(releaseManifest||{});
      downloadItem(selected.platform && selected.platform.portable, 'portable');
    });
  }
  fetch('releases/latest.json',{cache:'no-store'}).then(function(res){
    if(!res.ok) throw new Error('manifest '+res.status);
    return res.json();
  }).then(function(manifest){
    releaseManifest=manifest;
    releaseReady=true;
    renderRelease();
  }).catch(function(){
    releaseReady=false;
    if(installer){
      installer.textContent='暂时无法读取安装包';
      setDisabled(installer,true);
    }
    if(portable) portable.hidden=true;
    status.textContent='暂时无法读取发布清单。在线版仍可直接使用。';
    renderSteps('',[]);
  });
})();
</script>
</body>
</html>
